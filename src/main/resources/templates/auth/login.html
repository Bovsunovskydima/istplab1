<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Вхід', ~{::section})}">
<body>
<section>
    <div class="row justify-content-center align-items-center" style="min-height: 70vh;">
        <div class="col-md-6 col-lg-4">
            <div class="card border-0 shadow-lg">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-person-circle text-primary" style="font-size: 3rem;"></i>
                        <h3 class="fw-bold mt-2">Вхід у систему</h3>
                    </div>

                    <div th:if="${param.error}" class="alert alert-danger py-2 small">
                        Невірний email або пароль!
                    </div>
                    <div th:if="${param.logout}" class="alert alert-success py-2 small">
                        Ви успішно вийшли з системи.
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="form-floating mb-3">
                            <input type="email" class="form-control" id="emailInput" name="username" placeholder="name@example.com" required>
                            <label for="emailInput">Email адреса</label>
                        </div>

                        <div class="position-relative mb-4">
                            <div class="form-floating">
                                <input type="password" class="form-control pe-5" id="passwordInput" name="password" placeholder="Password" required>
                                <label for="passwordInput">Пароль</label>
                            </div>
                            <button type="button" id="togglePasswordBtn" class="btn border-0 position-absolute top-50 end-0 translate-middle-y me-1" style="z-index: 10;">
                                <i class="bi bi-eye text-muted fs-5" id="togglePasswordIcon"></i>
                            </button>
                        </div>

                        <button class="btn btn-primary w-100 py-2 mb-3 shadow-sm" type="submit">Увійти</button>
                    </form>

                    <div class="text-center small">
                        Ще немає акаунту? <a th:href="@{/register}" class="text-decoration-none">Зареєструватися</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const toggleBtn = document.getElementById('togglePasswordBtn');
            const passwordInput = document.getElementById('passwordInput');
            const toggleIcon = document.getElementById('togglePasswordIcon');

            toggleBtn.addEventListener('click', function () {
                const isPassword = passwordInput.getAttribute('type') === 'password';
                passwordInput.setAttribute('type', isPassword ? 'text' : 'password');

                toggleIcon.classList.toggle('bi-eye');
                toggleIcon.classList.toggle('bi-eye-slash');

                passwordInput.focus();
            });
        });
    </script>
</section>
</body>
</html>
