<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout :: layout('Профіль користувача', ~{::section})}">
<body>
<section>
    <div class="row g-4">
        <div class="col-md-4">
            <div class="card border-0 shadow-sm text-center pt-4 pb-3">
                <div class="mx-auto mb-3 bg-primary text-white rounded-circle d-flex justify-content-center align-items-center shadow-sm" style="width: 100px; height: 100px; font-size: 2.5rem;">
                    <i class="bi bi-person-circle"></i>
                </div>
                <div class="card-body">
                    <h4 class="card-title fw-bold" th:text="${user.fullName}">Ім'я</h4>
                    <p class="text-muted mb-3"><i class="bi bi-envelope"></i> <span th:text="${user.email}">Email</span></p>

                    <span th:class="${user.role.name() == 'Admin'} ? 'badge bg-danger mb-3 px-3 py-2' : 'badge bg-secondary mb-3 px-3 py-2'" th:text="${user.role}">Роль</span>

                    <ul class="list-group list-group-flush text-start mt-3">
                        <li class="list-group-item bg-transparent px-0 d-flex justify-content-between align-items-center">
                            <span class="text-muted"><i class="bi bi-calendar-check"></i> Зареєстровано</span>
                            <span class="fw-semibold" th:text="${#temporals.format(user.createdAt, 'dd.MM.yyyy')}">Дата</span>
                        </li>
                    </ul>

                    <hr>

                    <form sec:authorize="hasAuthority('Admin')" th:if="${user.role.name() != 'Admin'}" th:action="@{/users/{id}/role(id=${user.id})}" method="post" class="mt-3">
                        <label class="form-label small text-muted text-start w-100">Змінити роль</label>
                        <div class="input-group">
                            <select name="role" class="form-select form-select-sm">
                                <option th:each="r : ${roles}" th:value="${r}" th:text="${r}" th:selected="${r == user.role}"></option>
                            </select>
                            <button class="btn btn-sm btn-outline-warning">Оновити</button>
                        </div>
                    </form>

                    <div sec:authorize="hasAuthority('Admin')" th:if="${user.role.name() == 'Admin'}" class="mt-3 text-muted small text-start">
                        <i class="bi bi-shield-lock text-success"></i> Зміна ролі для адміністратора заборонена політикою безпеки.
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-header bg-white border-bottom-0 pt-4 pb-2">
                    <h5 class="fw-bold"><i class="bi bi-clock-history"></i> Історія оренди</h5>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                            <tr>
                                <th>Книга</th>
                                <th>Дата видачі</th>
                                <th>Статус / Повернення</th>
                                <th class="text-end">Дії</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="record : ${history}">
                                <td>
                                    <a th:href="@{/books/{id}(id=${record.book.id})}" class="text-decoration-none fw-semibold" th:text="${record.book.title}">Назва книги</a>
                                </td>
                                <td th:text="${#temporals.format(record.borrowDate, 'dd.MM.yyyy')}">Дата</td>
                                <td>
                                    <span th:if="${record.returnDate != null}" class="text-success"><i class="bi bi-check-circle"></i> <span th:text="${#temporals.format(record.returnDate, 'dd.MM.yyyy')}"></span></span>
                                    <span th:if="${record.returnDate == null}" class="badge bg-warning text-dark"><i class="bi bi-hourglass-split"></i> Читає</span>
                                </td>
                                <td class="text-end">
                                    <form th:if="${record.returnDate == null and (#authorization.expression('hasAuthority(''Admin'')') or #authentication.name == user.email)}"
                                          th:action="@{/borrow/return/{id}(id=${record.id})}" method="post">
                                        <button class="btn btn-sm btn-success"><i class="bi bi-arrow-return-left"></i> Повернути</button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(history)}">
                                <td colspan="4" class="text-center text-muted py-4">
                                    <i class="bi bi-journal-x fs-3 d-block mb-2"></i>
                                    Користувач ще не брав жодної книги
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
