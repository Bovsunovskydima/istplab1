<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Дії адміністраторів', ~{::section})}">
<body>
<section>
    <h2 class="fw-bold mb-4"><i class="bi bi-card-list"></i> Журнал дій адміністраторів</h2>

    <div class="card border-0 shadow-sm mb-4 bg-light">
        <div class="card-body">
            <form th:action="@{/admin/actions}" method="get" class="row g-2 align-items-center">
                <div class="col-md-9">
                    <input type="text" name="search" th:value="${search}" class="form-control" placeholder="Пошук за описом дії, ім'ям або email адміна...">
                </div>
                <div class="col-md-3 d-flex gap-2">
                    <button type="submit" class="btn btn-primary w-100"><i class="bi bi-search"></i> Знайти</button>
                    <a th:href="@{/admin/actions}" class="btn btn-outline-secondary">Скинути</a>
                </div>
            </form>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th>Дата та час</th>
                    <th>Адміністратор</th>
                    <th>Дія</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="action : ${actions}">
                    <td class="text-nowrap" th:text="${#temporals.format(action.actionDate, 'dd.MM.yyyy HH:mm:ss')}"></td>
                    <td>
                        <strong th:text="${action.admin.fullName}">Ім'я</strong> <br>
                        <small class="text-muted" th:text="${action.admin.email}">Email</small>
                    </td>
                    <td th:text="${action.actionDescription}">Опис дії</td>
                </tr>
                <tr th:if="${#lists.isEmpty(actions)}">
                    <td colspan="3" class="text-center py-4 text-muted">Записів не знайдено</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</body>
</html>
